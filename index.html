<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
        <link rel="stylesheet" href="style.css">
        <title>Часы и дата</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2&family=Roboto:wght@300;400;500;700&display=swap">
    </head>
    <body>
        <div class = "container">
            <div class = "date-time-widget">
                <div class = "buttons">
                <button id = "button1">
                    Окно
                 </button>
                </div>
                <div class = "wtime" id = "time">
                    <!--выводит время системы-->
                    <span id="hours">"hours"</span>:<span id="minutes">00</span> <span id="seconds"></span>
                </div>
                <div class = "wdate" id = "date">
                    <!--выводит дату системы-->
                    <span id = "day"></span> <span id = "month"></span> <span id = "year"></span>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
